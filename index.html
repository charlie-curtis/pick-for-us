<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Picker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 460px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.8rem;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .share-section {
      margin-top: 16px;
    }

    .btn-share {
      width: 100%;
      padding: 14px;
      background: #f5f0eb;
      color: #1a1a1a;
      font-size: 1.05rem;
      border-radius: 10px;
    }

    .share-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f5f0eb;
      border-radius: 0 0 10px 10px;
      padding: 0 14px;
      font-size: 0.82rem;
      color: #666;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease, padding 0.25s ease;
    }

    .share-box.open {
      max-height: 60px;
      padding: 10px 14px;
    }

    .share-box span {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-copy {
      background: none;
      border: none;
      color: #ff6b35;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e5e5e5;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #ff6b35;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }

    .btn-add {
      background: #ff6b35;
      color: white;
    }

    .restaurant-list {
      list-style: none;
      margin-bottom: 24px;
      min-height: 40px;
    }

    .restaurant-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: #fafafa;
      border: 2px solid #f0f0f0;
      font-size: 0.95rem;
      transition: background 0.3s, border-color 0.3s;
    }

    .restaurant-list li.winner {
      background: #fff4ee;
      border-color: #ff6b35;
      font-weight: 700;
      color: #ff6b35;
    }

    .remove-btn {
      background: none;
      color: #ccc;
      font-size: 1.1rem;
      padding: 0 4px;
      line-height: 1;
    }

    .remove-btn:hover {
      color: #e53e3e;
      opacity: 1;
    }

    .pick-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .btn-pick {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      color: white;
      font-size: 1.05rem;
      border-radius: 10px;
    }

    .result {
      font-size: 1.1rem;
      color: #ff6b35;
      font-weight: 700;
      text-align: center;
      min-height: 1.5em;
    }

    .empty-hint {
      color: #bbb;
      font-size: 0.85rem;
      text-align: center;
      padding: 8px 0;
    }

    .help-toggle {
      background: none;
      border: none;
      color: #aaa;
      font-size: 0.82rem;
      padding: 0;
      margin-bottom: 20px;
      cursor: pointer;
      text-decoration: underline;
    }

    .help-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .help-panel.open {
      max-height: 400px;
      margin-bottom: 20px;
    }

    .help-category {
      margin-bottom: 12px;
    }

    .help-category-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .help-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .help-chip {
      padding: 5px 12px;
      background: #f5f0eb;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #444;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .help-chip:hover {
      background: #ffe8dc;
      color: #ff6b35;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Meal Picker</h1>
    <p class="subtitle">Add your options and let fate decide.</p>

    <button class="help-toggle" onclick="toggleHelp()">Need help? Browse options</button>
    <div class="help-panel" id="helpPanel"></div>

    <div class="input-row">
      <input id="restaurantInput" type="text" placeholder="Restaurant name…" />
      <button class="btn-add" onclick="addRestaurant()">Add</button>
    </div>

    <ul id="restaurantList" class="restaurant-list">
      <li class="empty-hint" id="emptyHint">No restaurants yet.</li>
    </ul>

    <div class="pick-row">
      <button class="btn-pick" onclick="pickRandom()">Pick one</button>
      <div class="result" id="result"></div>
    </div>

    <div class="share-section">
      <button class="btn-share" onclick="toggleShare()">Share</button>
      <div class="share-box" id="shareBox">
        <span id="shareUrl"></span>
        <button class="btn-copy" onclick="copyLink()">Copy link</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAf8FxYhAgYPB3H2mDvzZUpfSUMAEDI240",
      authDomain: "meal-picker-a1961.firebaseapp.com",
      databaseURL: "https://meal-picker-a1961-default-rtdb.firebaseio.com",
      projectId: "meal-picker-a1961",
      storageBucket: "meal-picker-a1961.firebasestorage.app",
      messagingSenderId: "292156708829",
      appId: "1:292156708829:web:ee3b9535fd0bcfb1d78834"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Get room ID from URL, or generate a new one
    let roomId = new URLSearchParams(window.location.search).get('room');
    if (!roomId) {
      roomId = Math.random().toString(36).slice(2, 8);
      window.history.replaceState({}, '', `?room=${roomId}`);
    }

    const shareUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
    document.getElementById('shareUrl').textContent = shareUrl;

    const restaurantsRef = db.ref(`rooms/${roomId}/restaurants`);
    const winnerRef = db.ref(`rooms/${roomId}/winner`);

    const input = document.getElementById('restaurantInput');
    const list = document.getElementById('restaurantList');
    const result = document.getElementById('result');
    const emptyHint = document.getElementById('emptyHint');

    const SUGGESTIONS = {
      'Burgers': ["McDonald's", "Wendy's", "Burger King", "Shake Shack", "Chick-fil-A"],
      'Pizza': ["Domino's", "Pizza Hut", "Papa John's", "Little Caesars"],
      'Mexican': ["Chipotle", "Taco Bell", "Qdoba"],
      'Chicken': ["Popeyes", "KFC", "Wingstop", "Raising Cane's"],
      'Asian': ["Panda Express", "Cava", "Sweetgreen"],
      'Sandwiches': ["Subway", "Panera Bread", "Jimmy John's"],
    };

    const helpPanel = document.getElementById('helpPanel');
    Object.entries(SUGGESTIONS).forEach(([category, items]) => {
      const div = document.createElement('div');
      div.className = 'help-category';
      div.innerHTML = `<div class="help-category-label">${category}</div><div class="help-chips"></div>`;
      const chips = div.querySelector('.help-chips');
      items.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'help-chip';
        btn.textContent = name;
        btn.onclick = () => { restaurantsRef.push(name); };
        chips.appendChild(btn);
      });
      helpPanel.appendChild(div);
    });

    function toggleHelp() {
      helpPanel.classList.toggle('open');
    }

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addRestaurant(); });

    function toggleShare() {
      const box = document.getElementById('shareBox');
      box.classList.toggle('open');
    }

    function copyLink() {
      navigator.clipboard.writeText(shareUrl);
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy link', 2000);
    }

    function addRestaurant() {
      const name = input.value.trim();
      if (!name) return;
      restaurantsRef.push(name);
      input.value = '';
      input.focus();
    }

    function removeRestaurant(key) {
      restaurantsRef.child(key).remove();
      winnerRef.remove();
    }

    // Firebase pushes updates here whenever the list changes (for any user)
    restaurantsRef.on('value', snapshot => {
      const data = snapshot.val() || {};
      const entries = Object.entries(data); // [["key", "name"], ...]
      list.innerHTML = '';
      if (entries.length === 0) {
        list.appendChild(emptyHint);
        return;
      }
      entries.forEach(([key, name]) => {
        const li = document.createElement('li');
        li.dataset.key = key;
        li.textContent = name;
        const btn = document.createElement('button');
        btn.textContent = '×';
        btn.className = 'remove-btn';
        btn.onclick = () => removeRestaurant(key);
        li.appendChild(btn);
        list.appendChild(li);
      });
    });

    // Firebase pushes updates here when winner is set (for any user)
    winnerRef.on('value', snapshot => {
      const winner = snapshot.val();
      const items = list.querySelectorAll('li');
      items.forEach(li => li.classList.remove('winner'));
      if (winner) {
        result.textContent = `Let's go to ${winner}!`;
        items.forEach(li => {
          if (li.textContent.replace('×', '').trim() === winner) {
            li.classList.add('winner');
          }
        });
      }
    });

    function pickRandom() {
      const items = list.querySelectorAll('li');
      if (!items.length) {
        result.textContent = 'Add some restaurants first!';
        return;
      }

      const names = Array.from(items).map(li => li.dataset.key
        ? li.childNodes[0].textContent.trim()
        : null).filter(Boolean);

      result.textContent = '';
      let i = 0;
      const total = items.length;
      const interval = setInterval(() => {
        items.forEach(li => li.classList.remove('winner'));
        items[i % total].classList.add('winner');
        i++;
      }, 80);

      setTimeout(() => {
        clearInterval(interval);
        const winnerIndex = Math.floor(Math.random() * total);
        const winnerName = names[winnerIndex];
        winnerRef.set(winnerName);
      }, 1200);
    }
  </script>
</body>
</html>
